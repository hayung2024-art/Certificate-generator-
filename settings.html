<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/admin.css">



<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">



<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">


</head>



<body>





<div class="container">






<!-- SIDEBAR -->



<aside class="sidebar">



<div class="logo">

<i class="fa-solid fa-certificate"></i>

<h2>
Certificate Generator
</h2>


</div>







<ul class="menu">



<li>

<a href="dashboard.html">

<i class="fa-solid fa-house"></i>

Dashboard

</a>

</li>






<li>

<a href="create.html">

<i class="fa-solid fa-plus"></i>

Create Certificate

</a>

</li>







<li>

<a href="templates.html">

<i class="fa-solid fa-image"></i>

Templates

</a>

</li>







<li>

<a href="verify.html">

<i class="fa-solid fa-qrcode"></i>

Verify

</a>

</li>







<li class="active">

<a href="settings.html">

<i class="fa-solid fa-gear"></i>

Settings

</a>

</li>







<li>

<a href="#" id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</a>

</li>



</ul>



</aside>










<!-- MAIN CONTENT -->



<main class="main">






<header class="topbar">


<button id="menuBtn" class="menu-btn">

<i class="fa-solid fa-bars"></i>

</button>




<h1>
Website Settings
</h1>




<div class="admin">

<i class="fa-solid fa-user-shield"></i>

<span>
Admin
</span>


</div>



</header>










<section class="form-container">





<h2>

<i class="fa-solid fa-sliders"></i>

Certificate Settings

</h2>







<form id="settingsForm">







<div class="form-grid">






<div class="form-group">


<label>
Website Name
</label>


<input

type="text"

id="websiteName"

value="Certificate Generator">


</div>







<div class="form-group">


<label>
Organization Name
</label>


<input

type="text"

id="organization"

value="My Organization">


</div>







<div class="form-group">


<label>
Director Name
</label>


<input

type="text"

id="director"

placeholder="Enter Director Name">


</div>








<div class="form-group">


<label>
Certificate Prefix
</label>


<input

type="text"

id="prefix"

value="CERT">


</div>





</div>








<hr>








<div class="form-group">


<label>
Authorized Signature Upload
</label>


<input

type="file"

id="signature"

accept="image/*">


<img

id="signaturePreview"

class="file-preview"

alt="Signature Preview">


</div>









<div class="form-group">


<label>
Organization Logo Upload
</label>


<input

type="file"

id="logo"

accept="image/*">


<img

id="logoPreview"

class="file-preview"

alt="Logo Preview">


</div>









<div class="form-group">


<label>
Default Certificate Background
</label>


<input

type="file"

id="background"

accept="image/*">


<img

id="backgroundPreview"

class="background-preview"

alt="Background Preview">


</div>









<div class="form-group">


<label>
Theme Mode
</label>


<select id="theme">


<option value="light">

Light

</option>



<option value="dark">

Dark

</option>



</select>


</div>









<div class="form-group">


<label>
Certificate Footer Text
</label>



<textarea

id="footer"

rows="4">


Powered by Certificate Generator


</textarea>


</div>








<div class="buttons">


<button

type="submit"

class="btn-blue">


<i class="fa-solid fa-save"></i>


Save Settings


</button>





<button

type="reset"

class="btn-red">


<i class="fa-solid fa-rotate-left"></i>


Reset


</button>



</div>






</form>






</section>








<footer>

<p>

© 2026 Certificate Generator

</p>

</footer>







</main>




</div>








<script src="js/app.js"></script>

<script src="js/settings.js"></script>



</body>

</html>

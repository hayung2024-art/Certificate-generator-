<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Admin Login | Certificate Generator</title>


<meta name="description" content="Certificate Generator Admin Login Panel">



<link rel="stylesheet" href="css/login.css">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">



<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">



</head>



<body>





<div class="login-container">



<div class="login-box">





<!-- LOGO -->


<div class="logo">


<i class="fa-solid fa-certificate"></i>


<h2>
Certificate Generator
</h2>



<p>
Administrator Login
</p>


</div>







<!-- LOGIN FORM -->


<form id="loginForm">





<div class="input-box">


<label>
Email Address
</label>



<div class="input-field">


<i class="fa-solid fa-envelope"></i>



<input

type="email"

id="email"

placeholder="Enter admin email"

required>


</div>


</div>







<div class="input-box">


<label>
Password
</label>



<div class="input-field">


<i class="fa-solid fa-lock"></i>



<input

type="password"

id="password"

placeholder="Enter password"

required>



<i 
class="fa-solid fa-eye togglePassword">
</i>



</div>


</div>







<div class="remember">


<label>


<input 

type="checkbox"

id="remember">


Remember Me


</label>




<a href="">

Forgot Password?

</a>



</div>







<button

type="submit"

class="login-btn">


<i class="fa-solid fa-right-to-bracket"></i>

Login


</button>





</form>







<!-- DEMO -->


<div class="demo">


<h4>
Demo Admin Account
</h4>


<p>
<i class="fa-solid fa-envelope"></i>

admin@gmail.com

</p>


<p>

<i class="fa-solid fa-lock"></i>

admin123

</p>



</div>







<!-- BACK HOME -->


<div class="back">


<a href="index.html">


<i class="fa-solid fa-arrow-left"></i>


Back To Home


</a>



</div>





</div>



</div>








<script src="js/login.js"></script>


</body>

</html>
